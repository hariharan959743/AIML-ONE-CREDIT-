<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio Website</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>
<body>
  <div class="container mt-4">
    <h1>Portfolio Web App</h1>
    <p class="text-muted">Node + Express + Vanilla JS (no Python required)</p>

    <div id="alert-placeholder"></div>

    <div class="card mb-4">
      <div class="card-body">
        <h5>Add Position</h5>
        <form id="add-form" class="row g-2">
          <div class="col-md-3"><input id="symbol" class="form-control" placeholder="Symbol" required></div>
          <div class="col-md-3"><input id="quantity" class="form-control" type="number" step="any" placeholder="Quantity" required></div>
          <div class="col-md-3"><input id="cost_basis" class="form-control" type="number" step="any" placeholder="Cost Basis" required></div>
          <div class="col-md-3"><button class="btn btn-primary w-100" type="submit">Add / Merge</button></div>
        </form>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-striped" id="portfolio-table">
        <thead>
          <tr><th>Symbol</th><th>Quantity</th><th>Cost Basis</th><th>Value</th><th>PL</th><th>Actions</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card mt-4">
      <div class="card-body" id="summary"></div>
    </div>

    <div class="mt-4">
      <h5>Update market prices (format):</h5>
      <input id="price-info" class="form-control" placeholder="AAPL=178,MSFT=290,GOOG=110" />
      <button id="apply-prices" class="btn btn-secondary mt-2">Apply</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
